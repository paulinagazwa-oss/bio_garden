openapi: 3.0.3
info:
  title: Bio-Garden API
  version: 1.0.0
  description: OpenAPI definition to backend app in Spring Boot.
servers:
  - url: https://localhost:8443
    description: Local server (HTTPS)
  - url: http://localhost:8080
    description: Local server (HTTP – redirects to HTTPS)

tags:
  - name: Plants
    description: Operations related to plants

paths:
  /api/v1/plants:
    get:
      tags:
        - Plants
      summary: Download paginated list of plants
      description: Returns paginated list of plants.
      operationId: listPlants
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: Page size (number of items per page)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: sort
          in: query
          description: Sorting \. `name,asc`
          required: false
          schema:
            type: string
            default: name,asc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantPage"

        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags:
        - Plants
      summary: Create new plant
      operationId: createPlant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantCreateRequest"

      responses:
        "201":
          description: Created
          headers:
            Location:
              description: URL to newly created plant
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/plants/{plantId}:
    get:
      tags:
        - Plants
      summary: Download plant by ID
      operationId: getPlantById
      parameters:
        - name: plantId
          in: path
          required: true
          description: plant ID
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Plants
      summary: Update plant
      operationId: updatePlant
      parameters:
        - name: plantId
          in: path
          required: true
          description: plant ID
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Plants
      summary: Remove plant
      operationId: deletePlant
      parameters:
        - name: plantId
          in: path
          required: true
          description: Plant ID
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Removed
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    Conflict:
      description: Conflict (e.g. duplicate name)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Plant:
      type: object
      required:
        - id
        - name
        - crop
        - sowFrom
        - sowTo
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: "Cucumber"
        crop:
          $ref: "#/components/schemas/CropType"
        sowPeriod:
          $ref: "#/components/schemas/SowPeriod"
        daysToHarvest:
          type: integer
          minimum: 1
          example: 60
        creationDate:
          type: string
          format: date-time
          example: "2026-01-28T10:15:30Z"
        lastUpdateDate:
          type: string
          format: date-time
          example: "2026-02-28T10:15:30Z"
    CropType:
      type: string
      enum:
        - LEAF
        - ROOT
        - FRUIT
        - FLOWER
        - SEED
    SowPeriod:
      type: object
      properties:
        sowFrom:
          type: string
          format: date-time
        sowTo:
          type: string
          format: date-time
    PlantCreateRequest:
      type: object
      required:
        - name
        - crop
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        crop:
           $ref: "#/components/schemas/CropType"
        sowPeriod:
          $ref: "#/components/schemas/SowPeriod"
        daysToHarvest:
          type: integer
          minimum: 1

    PlantUpdateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        crop:
          $ref: "#/components/schemas/CropType"
        sowPeriod:
          $ref: "#/components/schemas/SowPeriod"
        daysToHarvest:
          type: integer
          minimum: 1

    PlantPage:
      type: object
      required:
        - content
        - page
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Plant"
        page:
          $ref: "#/components/schemas/PageInfo"

    PageInfo:
      type: object
      required:
        - number
        - size
        - totalElements
        - totalPages
      properties:
        number:
          type: integer
          minimum: 0
          example: 0
        size:
          type: integer
          minimum: 1
          example: 20
        totalElements:
          type: integer
          minimum: 0
          example: 1
        totalPages:
          type: integer
          minimum: 0
          example: 1

    Problem:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          example: "https://example.com/problems/validation"
        title:
          type: string
          example: "Validation failed"
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
          example: "Feld `name` is required"
        instance:
          type: string
          example: "/api/v1/plants"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: "name"
        message:
          type: string
          example: "must not be blank"
